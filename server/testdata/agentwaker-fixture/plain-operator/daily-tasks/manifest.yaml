schema_version: "1.0"
role_id: plain-operator
automations:
  - id: daily-review
    title: Daily review
    prompt_file: daily-review.prompt.md
    execution:
      mode: run_only
    schedule:
      kind: cron
      expression: "0 9 * * *"
      timezone: UTC
      initial_enabled: false
    sync:
      content: source-authoritative
      schedule: source-authoritative
      activation: workspace-preserve
      missing: archive
    governance:
      external_writes: read-only
